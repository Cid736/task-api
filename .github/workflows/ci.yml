name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}
          NODE_ENV: test

  docker:
    name: Docker build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t task-api:${{ github.sha }} .

      - name: Smoke test
        run: |
          docker run -d --name api -p 3000:3000 \
            -e JWT_SECRET=smoke-test \
            task-api:${{ github.sha }}
          sleep 3
          curl -f http://localhost:3000/health
          docker stop api
